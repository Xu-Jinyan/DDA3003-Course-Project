<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="public, max-age=3600">
    <title>Pandemic-Flight Global Watcher (PFGW)</title>
    <script src="/static/js/d3.v7.min.js"></script>
    <style>
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%; background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden;
        }
        #map-container { width: 100%; height: 100vh; }
        
        /* 顶部全局数据板 */
        #dashboard { position: absolute; top: 20px; left: 20px; background: rgba(22, 27, 34, 0.8); padding: 15px 25px; border-radius: 8px; border: 1px solid #30363d; pointer-events: none; backdrop-filter: blur(5px); }
        #dashboard h1 { margin: 0 0 10px 0; font-size: 18px; color: #58a6ff; }
        .stat-row { display: flex; justify-content: space-between; gap: 20px; margin-bottom: 5px; }
        .stat-label { color: #8b949e; font-size: 14px; }
        .stat-value { font-weight: bold; font-size: 16px; color: #ff7b72; }

        /* 底部时间轴控制台 */
        #timeline-controls { position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); background: rgba(22, 27, 34, 0.9); padding: 15px 30px; border-radius: 30px; display: flex; align-items: center; gap: 15px; border: 1px solid #30363d; width: 60%; max-width: 800px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #play-btn { background: #238636; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        #play-btn:hover { background: #2ea043; }
        #play-btn:disabled { background: #555; cursor: not-allowed; }
        #time-slider { flex-grow: 1; cursor: pointer; accent-color: #ff7b72; }
        #current-date { font-weight: bold; color: #fff; min-width: 100px; text-align: center; }

        /* 悬浮提示框 (Tooltip) */
        #tooltip { position: absolute; background: rgba(0,0,0,0.8); color: #fff; padding: 10px; border-radius: 5px; border: 1px solid #ff7b72; pointer-events: none; opacity: 0; transition: opacity 0.2s; font-size: 13px; z-index: 10; }

        /* 加载指示器 */
        #loading-indicator { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(22, 27, 34, 0.95); padding: 30px 40px; border-radius: 12px; border: 1px solid #30363d; text-align: center; z-index: 1000; }
        .spinner { border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 0 auto 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-text { color: #8b949e; font-size: 14px; }
        .error-message { color: #ff7b72; margin-top: 10px; font-size: 12px; }

        /* D3 元素样式 */
        .country { stroke: #30363d; stroke-width: 0.5px; transition: fill 0.3s; }
        .country:hover { stroke: #ffffff; stroke-width: 1.5px; }
        .flight-path { fill: none; stroke: #ff7b72; stroke-width: 1.5px; opacity: 0.6; stroke-dasharray: 4, 4; animation: dash 2s linear infinite; }
        .airport { fill: #58a6ff; stroke: #fff; stroke-width: 1px; }

        @keyframes dash { to { stroke-dashoffset: -8; } }

        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="map-container"></div>

    <div id="dashboard">
        <h1>🌍 PFGW 全局监控板</h1>
        <div class="stat-row">
            <span class="stat-label">全球活跃病例:</span>
            <span class="stat-value" id="global-cases">0</span>
        </div>
        <div class="stat-row">
            <span class="stat-label">高风险航班数:</span>
            <span class="stat-value" id="active-flights">0</span>
        </div>
    </div>

    <div id="timeline-controls">
        <button id="play-btn">播放 (Play)</button>
        <input type="range" id="time-slider" min="0" max="100" value="0">
        <span id="current-date">加载中...</span>
    </div>

    <div id="loading-indicator">
        <div class="spinner"></div>
        <div class="loading-text">正在加载数据...</div>
        <div class="error-message hidden"></div>
    </div>

    <div id="tooltip"></div>

    <script>
        // ==========================================
        // 全局变量和配置
        // ==========================================
        
        const API_BASE = '';
        let dateRange = null;
        let currentSnapshot = null;
        let airports = [];
        let covidCountryData = {};
        
        // ==========================================
        // 工具函数
        // ==========================================
        
        function showLoading(message = '正在加载数据...') {
            document.querySelector('.loading-text').textContent = message;
            document.querySelector('.error-message').classList.add('hidden');
            document.getElementById('loading-indicator').classList.remove('hidden');
        }
        
        function hideLoading() {
            document.getElementById('loading-indicator').classList.add('hidden');
        }
        
        function showError(message) {
            const errorElement = document.querySelector('.error-message');
            errorElement.textContent = message;
            errorElement.classList.remove('hidden');
            document.querySelector('.loading-text').textContent = '加载失败';
        }
        
        function formatDate(dateString) {
            const date = new Date(dateString);
            return date.toISOString().split('T')[0];
        }
        
        function calculateDateFromProgress(progress) {
            if (!dateRange) return new Date().toISOString().split('T')[0];
            
            const start = new Date(dateRange.start);
            const end = new Date(dateRange.end);
            const totalDays = dateRange.total_days - 1;
            
            const currentDayOffset = Math.floor((progress / 100) * totalDays);
            const currentDate = new Date(start);
            currentDate.setDate(start.getDate() + currentDayOffset);
            
            return currentDate.toISOString().split('T')[0];
        }
        
        async function fetchWithRetry(url, retries = 3, delay = 1000) {
            for (let i = 0; i < retries; i++) {
                try {
                    const response = await fetch(url);
                    if (!response.ok) {
                        throw new Error(`HTTP error! status: ${response.status}`);
                    }
                    return await response.json();
                } catch (error) {
                    if (i === retries - 1) throw error;
                    await new Promise(resolve => setTimeout(resolve, delay));
                }
            }
        }
        
        // ==========================================
        // 数据加载模块
        // ==========================================
        
        async function initializeData() {
            try {
                showLoading('正在加载日期范围...');
                
                // 获取日期范围
                const rangeData = await fetchWithRetry(`${API_BASE}/api/date-range`);
                if (rangeData.error) {
                    throw new Error(rangeData.error);
                }
                dateRange = rangeData;
                
                // 获取机场数据
                showLoading('正在加载机场数据...');
                const airportData = await fetchWithRetry(`${API_BASE}/api/airports`);
                if (airportData.airports) {
                    airports = airportData.airports.map(airport => ({
                        id: airport.airport,
                        coords: airport.coords
                    }));
                }
                
                // 设置滑块初始值
                const slider = document.getElementById('time-slider');
                slider.value = 0;
                
                // 加载初始日期的数据
                const initialDate = calculateDateFromProgress(0);
                await loadSnapshot(initialDate);
                
                hideLoading();
                
            } catch (error) {
                console.error('初始化失败:', error);
                showError(`数据加载失败: ${error.message}`);
            }
        }
        
        async function loadSnapshot(date) {
            try {
                showLoading(`正在加载 ${date} 的数据...`);
                
                const snapshot = await fetchWithRetry(`${API_BASE}/api/snapshot?date=${date}&max_flights=50`);
                
                if (snapshot.error) {
                    throw new Error(snapshot.error);
                }
                
                currentSnapshot = snapshot;
                
                // 更新国家数据映射
                covidCountryData = {};
                snapshot.countries.forEach(country => {
                    covidCountryData[country.countryCode] = {
                        risk: Math.min(1.0, country.cases / 1000000), // 归一化处理
                        cases: country.cases
                    };
                });
                
                // 更新UI
                updateDashboard(snapshot);
                updateMapColors();
                updateFlights(snapshot.flights);
                
                hideLoading();
                
            } catch (error) {
                console.error('加载数据失败:', error);
                showError(`加载 ${date} 的数据失败: ${error.message}`);
            }
        }
        
        // ==========================================
        // UI更新函数
        // ==========================================
        
        function updateDashboard(snapshot) {
            document.getElementById('current-date').textContent = formatDate(snapshot.date);
            document.getElementById('global-cases').textContent = snapshot.globalCases.toLocaleString();
            document.getElementById('active-flights').textContent = snapshot.totalFlights;
        }
        
        function updateMapColors() {
            if (!currentSnapshot) return;
            
            mapLayer.selectAll('.country')
                .attr('fill', function(d) {
                    const countryCode = d.id;
                    const countryInfo = covidCountryData[countryCode];
                    
                    if (!countryInfo || countryInfo.risk < 0.01) {
                        return '#21262d';  // 基础颜色
                    }
                    
                    return colorScale(countryInfo.risk);
                });
        }
        
        function updateFlights(flights) {
            if (!flights) return;
            
            // 绑定数据并更新航班路线
            const flightPaths = flightLayer.selectAll('.flight-path').data(flights);
            
            flightPaths.exit().remove();
            
            flightPaths.enter()
                .append('path')
                .attr('class', 'flight-path')
                .merge(flightPaths)
                .attr('d', d => {
                    const route = { type: 'LineString', coordinates: [d.source, d.target] };
                    return path(route);
                });
        }
        
        // ==========================================
        // D3.js可视化模块
        // ==========================================
        
        const width = window.innerWidth;
        const height = window.innerHeight;
        const svg = d3.select('#map-container').append('svg')
            .attr('width', width)
            .attr('height', height);
        
        const projection = d3.geoNaturalEarth1()
            .scale(width / 5.5)
            .translate([width / 2, height / 2]);
        
        const path = d3.geoPath().projection(projection);
        const colorScale = d3.scaleThreshold().domain([1000, 10000, 100000, 1000000, 10000000]).range(['#f7f7f7', '#fee5d9', '#fcbba1', '#fc9272', '#fb6a4a', '#cb181d']);

        const mapLayer = svg.append('g').attr('class', 'map-layer');
        const flightLayer = svg.append('g').attr('class', 'flight-layer');
        const airportLayer = svg.append('g').attr('class', 'airport-layer');
        const tooltip = d3.select('#tooltip');
        
        // 加载世界地图
        d3.json('/static/data/world.geojson').then(function(world) {
            
            // 渲染国家
            mapLayer.selectAll('path')
                .data(world.features)
                .enter()
                .append('path')
                .attr('class', 'country')
                .attr('d', path)
                .attr('fill', '#21262d')
                .on('mouseover', function(event, d) {
                    const countryCode = d.id;
                    const countryInfo = covidCountryData[countryCode];
                    const countryName = d.properties.name;
                    
                    let tooltipContent = `<b>${countryName}</b>`;
                    if (countryInfo) {
                        tooltipContent += `<br/>病例数: <span style="color:#ff7b72">${countryInfo.cases.toLocaleString()}</span>`;
                    } else {
                        tooltipContent += '<br/>暂无数据';
                    }
                    
                    tooltip.transition().duration(200).style('opacity', 1);
                    tooltip.html(tooltipContent)
                        .style('left', (event.pageX + 15) + 'px')
                        .style('top', (event.pageY - 28) + 'px');
                })
                .on('mouseout', function() {
                    tooltip.transition().duration(500).style('opacity', 0);
                });
            
            // 数据加载完成后初始化
            initializeData();
        }).catch(error => {
            console.error('加载地图数据失败:', error);
            showError('地图数据加载失败');
        });
        
        // ==========================================
        // 交互控制模块
        // ==========================================
        
        const slider = document.getElementById('time-slider');
        const playBtn = document.getElementById('play-btn');
        let playInterval;
        let isPlaying = false;
        
        // 滑块事件处理
        slider.addEventListener('input', async (e) => {
            if (!dateRange) return;
            
            const progress = parseInt(e.target.value);
            const newDate = calculateDateFromProgress(progress);
            document.getElementById('current-date').textContent = newDate;
            
            // 加载新日期的数据
            await loadSnapshot(newDate);
        });
        
        // 播放/暂停控制
        playBtn.addEventListener('click', () => {
            if (isPlaying) {
                // 停止播放
                clearInterval(playInterval);
                playBtn.textContent = '播放 (Play)';
                playBtn.style.background = '#238636';
                isPlaying = false;
            } else {
                // 开始播放
                playBtn.textContent = '暂停 (Pause)';
                playBtn.style.background = '#b62324';
                isPlaying = true;
                
                playInterval = setInterval(async () => {
                    let val = parseInt(slider.value);
                    
                    if (val >= 100) {
                        // 到达末尾，停止播放
                        clearInterval(playInterval);
                        isPlaying = false;
                        playBtn.textContent = '重新播放 (Replay)';
                        playBtn.style.background = '#238636';
                        slider.value = 0;
                        return;
                    }
                    
                    val += 1;
                    slider.value = val;
                    
                    const newDate = calculateDateFromProgress(val);
                    document.getElementById('current-date').textContent = newDate;
                    await loadSnapshot(newDate);
                }, 300);  
            }
        });
        
        // ==========================================
        // 窗口大小调整
        // ==========================================
        
        window.addEventListener('resize', () => {
            const newWidth = window.innerWidth;
            const newHeight = window.innerHeight;
            
            svg.attr('width', newWidth).attr('height', newHeight);
            projection.scale(newWidth / 5.5).translate([newWidth / 2, newHeight / 2]);
            
            mapLayer.selectAll('path').attr('d', path);
            
            if (airports && airports.length > 0) {
                airportLayer.selectAll('.airport')
                    .attr('cx', d => projection(d.coords)[0])
                    .attr('cy', d => projection(d.coords)[1]);
            }
            
            if (currentSnapshot && currentSnapshot.flights) {
                flightLayer.selectAll('.flight-path')
                    .attr('d', d => path({ type: 'LineString', coordinates: [d.source, d.target] }));
            }
        });
    </script>
</body>
</html>
